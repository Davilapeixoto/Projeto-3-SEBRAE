<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/recursos-plataforma.css}">
    <script defer th:src="@{/js/recursos-plataforma.js}"></script>
    <title>Cadastro | SEBRAE</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Arial, Helvetica, sans-serif; background: #f1f5fb; color: #172033; }
        .caixa { width: 100%; max-width: 470px; background: white; padding: 36px; border-radius: 20px; border: 1px solid #dfe4ea; box-shadow: 0 20px 50px rgba(22, 34, 51, 0.1); }
        .marca { display: block; margin-bottom: 28px; color: #0050c8; font-size: 1.4rem; font-weight: 800; text-decoration: none; }
        h1 { margin: 0 0 8px; }
        .subtitulo { margin: 0 0 26px; color: #667085; }
        label { display: block; margin-bottom: 7px; font-weight: 700; }
        input { width: 100%; padding: 13px 14px; margin-bottom: 6px; border: 1px solid #cfd6df; border-radius: 10px; font-size: 1rem; }
        input:focus { outline: 2px solid #9bc2ff; border-color: #0050c8; }
        .campo { margin-bottom: 16px; }
        .erro-campo { margin: 5px 0 0; color: #b42318; font-size: 0.88rem; }
        .erro-geral { padding: 12px; margin-bottom: 18px; border-radius: 10px; background: #fff1f1; color: #a11818; }
        button { width: 100%; padding: 13px; border: 0; border-radius: 10px; background: #0050c8; color: white; font-size: 1rem; font-weight: 800; cursor: pointer; }
        .rodape { margin-top: 22px; text-align: center; color: #667085; }
        .rodape a { color: #0050c8; font-weight: 700; }
    </style>
</head>
<body>
<button type="button" class="tema-toggle tema-toggle-flutuante" data-tema-toggle aria-label="Ativar modo escuro" title="Modo escuro">☾</button>
<main class="caixa">
    <a class="marca" th:href="@{/}">SEBRAE</a>
    <h1>Criar nova conta</h1>
    <p class="subtitulo">Preencha os dados para acessar a administração.</p>

    <div class="erro-geral" th:if="${erro}" th:text="${erro}"></div>

    <form th:action="@{/cadastro}" th:object="${usuario}" method="post">
        <div class="campo">
            <label for="nome">Nome</label>
            <input id="nome" type="text" th:field="*{nome}" maxlength="120" required>
            <p class="erro-campo" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
        </div>

        <div class="campo">
            <label for="email">E-mail</label>
            <input id="email" type="email" th:field="*{email}" maxlength="160" required>
            <p class="erro-campo" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>

        <div class="campo">
            <label for="senha">Senha</label>
            <input id="senha" type="password" th:field="*{senha}" minlength="6" maxlength="100" required>
            <p class="erro-campo" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></p>
        </div>

        <button type="submit">Cadastrar</button>
    </form>

    <p class="rodape">Já possui conta? <a th:href="@{/login}">Entrar</a></p>
</main>
</body>
</html>
