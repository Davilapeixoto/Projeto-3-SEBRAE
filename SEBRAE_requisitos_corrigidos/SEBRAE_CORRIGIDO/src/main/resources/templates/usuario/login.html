<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/recursos-plataforma.css}">
    <script defer th:src="@{/js/recursos-plataforma.js}"></script>
    <title>Entrar | SEBRAE</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(135deg, #003b94, #0070e8); color: #172033; }
        .caixa { width: 100%; max-width: 430px; background: white; padding: 36px; border-radius: 20px; box-shadow: 0 24px 60px rgba(0, 24, 70, 0.3); }
        .marca { display: block; margin-bottom: 28px; color: #0050c8; font-size: 1.4rem; font-weight: 800; text-decoration: none; }
        h1 { margin: 0 0 8px; }
        .subtitulo { margin: 0 0 26px; color: #667085; }
        label { display: block; margin-bottom: 7px; font-weight: 700; }
        input { width: 100%; padding: 13px 14px; margin-bottom: 18px; border: 1px solid #cfd6df; border-radius: 10px; font-size: 1rem; }
        input:focus { outline: 2px solid #9bc2ff; border-color: #0050c8; }
        button { width: 100%; padding: 13px; border: 0; border-radius: 10px; background: #0050c8; color: white; font-size: 1rem; font-weight: 800; cursor: pointer; }
        .mensagem { border-radius: 10px; padding: 12px; margin-bottom: 18px; }
        .erro { background: #fff1f1; color: #a11818; }
        .sucesso { background: #ecfdf3; color: #067647; }
        .rodape { margin-top: 22px; text-align: center; color: #667085; }
        .rodape a { color: #0050c8; font-weight: 700; }
    </style>
</head>
<body>
<button type="button" class="tema-toggle tema-toggle-flutuante" data-tema-toggle aria-label="Ativar modo escuro" title="Modo escuro">☾</button>
<main class="caixa">
    <a class="marca" th:href="@{/}">SEBRAE</a>
    <h1>Acessar o sistema</h1>
    <p class="subtitulo">Entre para administrar os cursos da plataforma.</p>

    <div class="mensagem erro" th:if="${erro}" th:text="${erro}"></div>
    <div class="mensagem sucesso" th:if="${param.cadastro}">Cadastro realizado com sucesso.</div>

    <form th:action="@{/login}" method="post">
        <label for="email">E-mail</label>
        <input id="email" type="email" name="email" autocomplete="email" required>

        <label for="senha">Senha</label>
        <input id="senha" type="password" name="senha" autocomplete="current-password" required>

        <button type="submit">Entrar</button>
    </form>

    <p class="rodape">Não possui conta? <a th:href="@{/cadastro}">Cadastre-se</a></p>
</main>
</body>
</html>
