<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/recursos-plataforma.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script th:src="@{/js/recursos-plataforma.js}"></script>
    <title>Painel administrativo | Ki</title>
</head>
<body class="admin-body">
<aside th:replace="~{admin/fragments :: sidebar('home')}"></aside>

<main class="admin-main">
    <header class="admin-header">
        <div>
            <h1 class="admin-title">Painel administrativo</h1>
            <p class="admin-subtitle">Olá, <span th:text="${usuarioLogado.nome}">Administrador</span>.</p>
        </div>
        <div class="admin-header-actions">
            <button type="button" class="tema-toggle" data-tema-toggle aria-label="Ativar modo escuro" title="Modo escuro">☾</button>
            <a class="admin-logout" th:href="@{/logout}">Sair</a>
        </div>
    </header>

    <section class="admin-grid admin-grid-metrics" aria-label="Resumo do sistema">
        <article class="admin-card">
            <span class="admin-card-label">Total de cursos</span>
            <strong class="admin-card-value" th:text="${totalCursos}">0</strong>
        </article>
        <article class="admin-card">
            <span class="admin-card-label">Áreas cadastradas</span>
            <strong class="admin-card-value" th:text="${totalAreas}">0</strong>
        </article>
        <article class="admin-card">
            <span class="admin-card-label">Tags cadastradas</span>
            <strong class="admin-card-value" th:text="${totalTags}">0</strong>
        </article>
        <article class="admin-card">
            <span class="admin-card-label">Acessos aos cursos</span>
            <strong class="admin-card-value" th:text="${totalVisualizacoes}">0</strong>
        </article>
    </section>

    <section class="admin-section">
        <div class="admin-section-header">
            <div>
                <h2 class="admin-section-title">Ações rápidas</h2>
                <p class="admin-section-description">Acesse as principais funções administrativas.</p>
            </div>
        </div>
        <div class="admin-actions">
            <a class="admin-button" th:href="@{/cursos/novo}">Cadastrar curso</a>
            <a class="admin-button-secondary" th:href="@{/cursos/gerenciar}">Gerenciar cursos</a>
            <a class="admin-button-secondary" th:href="@{/admin/areas}">Gerenciar áreas</a>
            <a class="admin-button-secondary" th:href="@{/admin/tags}">Gerenciar tags</a>
            <a class="admin-button-secondary" th:href="@{/admin/estatisticas}">Ver estatísticas</a>
        </div>
    </section>
</main>
</body>
</html>
