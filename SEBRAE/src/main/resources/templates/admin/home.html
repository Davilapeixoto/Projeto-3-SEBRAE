<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel administrativo | SEBRAE</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: flex; font-family: Arial, Helvetica, sans-serif; background: #f4f6f9; color: #172033; }
        aside { width: 260px; background: #101828; color: white; padding: 28px 20px; }
        .marca { display: block; margin-bottom: 34px; color: white; font-size: 1.35rem; font-weight: 800; text-decoration: none; }
        aside a { display: block; margin-bottom: 8px; padding: 12px 14px; border-radius: 10px; color: #d0d5dd; text-decoration: none; font-weight: 700; }
        aside a:hover, aside a.ativo { background: #1d2939; color: white; }
        main { flex: 1; padding: 34px; }
        header { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 34px; }
        h1 { margin: 0 0 6px; }
        .subtitulo { margin: 0; color: #667085; }
        .sair { color: #0050c8; font-weight: 700; text-decoration: none; }
        .grade { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #dfe4ea; border-radius: 16px; padding: 24px; }
        .card span { color: #667085; }
        .card strong { display: block; margin-top: 10px; font-size: 2.2rem; }
        .acoes { margin-top: 26px; display: flex; flex-wrap: wrap; gap: 12px; }
        .botao { padding: 12px 18px; border-radius: 10px; background: #0050c8; color: white; text-decoration: none; font-weight: 800; }
        .secundario { background: white; border: 1px solid #cfd6df; color: #172033; }
        @media (max-width: 780px) { body { display: block; } aside { width: 100%; } .grade { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<aside>
    <a class="marca" th:href="@{/admin/home}">SEBRAE Admin</a>
    <a class="ativo" th:href="@{/admin/home}">Visão geral</a>
    <a th:href="@{/admin/areas}">Áreas</a>
    <a th:href="@{/admin/tags}">Tags</a>
    <a th:href="@{/}">Ver plataforma</a>
</aside>
<main>
    <header>
        <div>
            <h1>Painel administrativo</h1>
            <p class="subtitulo">Olá, <span th:text="${usuarioLogado.nome}">Administrador</span>.</p>
        </div>
        <a class="sair" th:href="@{/logout}">Sair</a>
    </header>

    <section class="grade">
        <article class="card">
            <span>Total de cursos</span>
            <strong th:text="${totalCursos}">0</strong>
        </article>
        <article class="card">
            <span>Áreas cadastradas</span>
            <strong th:text="${totalAreas}">0</strong>
        </article>
        <article class="card">
            <span>Tags cadastradas</span>
            <strong th:text="${totalTags}">0</strong>
        </article>
    </section>

    <div class="acoes">
        <a class="botao" th:href="@{/admin/areas}">Cadastrar áreas</a>
        <a class="botao" th:href="@{/admin/tags}">Cadastrar tags</a>
        <a class="botao secundario" th:href="@{/cursos}">Ver plataforma</a>
    </div>
</main>
</body>
</html>
