<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ki - Login</title>
    <script>
        (function () {
            try {
                const temaSalvo = localStorage.getItem("sebrae-tema");
                const prefereEscuro = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
                if (temaSalvo === "escuro" || (!temaSalvo && prefereEscuro)) {
                    document.documentElement.classList.add("tema-escuro");
                }
            } catch (erro) { /* preferência visual opcional */ }
        }());
    </script>
    <style>
        /* --- Reset e Alinhamento Global --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        .login-wrapper {
            background: linear-gradient(135deg, #0F0F77 0%, #0F0F77 58%, #F32C06 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; padding: 20px;
        }

        /* --- Card Branco Minimalista --- */
        .login-container {
            background-color: #ffffff; padding: 50px 40px; width: 100%; max-width: 440px;
            text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); border-radius: 4px; border-top: 7px solid #E7F118;
        }

        .close-icon { position: absolute; top: 25px; right: 25px; color: #a0aec0; font-size: 18px; cursor: pointer; }

        .logo-sebrae { display: block; max-width: 130px; height: auto; margin: 0 auto 15px auto; }

        .login-container h2 { color: #0F0F77; font-size: 24px; margin-bottom: 40px; font-weight: 600; letter-spacing: 0.5px; }

        /* --- Estilização do Bloco de Erro Dinâmico do Spring Boot --- */
        .alerta-erro {
            background-color: #FFF5F5; border-left: 4px solid #E53E3E;
            color: #C53030; padding: 12px; margin-bottom: 25px; font-size: 14px; text-align: left; border-radius: 4px;
        }

        /* --- Inputs em Linha --- */
        .input-group { text-align: left; margin-bottom: 30px; position: relative; }
        .input-group label { display: block; font-size: 13px; color: #718096; margin-bottom: 4px; }
        .input-group label::before { content: "• "; color: #F32C06; font-weight: bold; }

        .input-group input {
            width: 100%; padding: 10px 0px; border: none; border-bottom: 2px solid #e2e8f0;
            font-size: 16px; color: #2d3748; outline: none; background: transparent; transition: border-color 0.3s ease;
        }
        .input-group input:focus { border-bottom-color: #F32C06; }

        /* --- Botões e Links --- */
        .btn-entrar {
            width: 100%; padding: 16px; background: linear-gradient(90deg, #0F0F77 0%, #F32C06 100%);
            color: #ffffff; border: none; font-size: 15px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer; margin-top: 15px; margin-bottom: 25px;
            transition: opacity 0.2s ease, transform 0.1s ease; box-shadow: 0 4px 12px rgba(243, 44, 6, 0.28);
        }
        .btn-entrar:hover { opacity: 0.95; }
        .btn-entrar:active { transform: scale(0.99); }

        .signup-link { display: inline-block; font-size: 14px; color: #718096; text-decoration: none; }
        .signup-link span { color: #0F0F77; font-weight: 600; }
        .signup-link:hover span { text-decoration: underline; }

        /* --- Alternância de tema --- */
        .tema-toggle-auth {
            position: absolute; top: 20px; left: 20px; z-index: 3;
            width: 42px; height: 42px; border: 1px solid rgba(15, 15, 119, .18);
            border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
            background: #EAE8E1; color: #0F0F77; font-size: 20px; font-weight: 800;
            cursor: pointer; box-shadow: 0 8px 20px rgba(15, 15, 119, .14);
            transition: transform .18s ease, background-color .18s ease, color .18s ease;
        }
        .tema-toggle-auth:hover { transform: translateY(-2px); background: #E7F118; }
        .logo-sebrae { width: auto; max-width: 88px; max-height: 104px; object-fit: contain; }

        html.tema-escuro .login-wrapper {
            background: linear-gradient(135deg, #05051e 0%, #0F0F77 62%, #7b1907 100%);
        }
        html.tema-escuro .login-container {
            background: #15154A; border-top-color: #E7F118;
            box-shadow: 0 24px 65px rgba(0, 0, 0, .48);
        }
        html.tema-escuro .login-container h2 { color: #E7F118; }
        html.tema-escuro .close-icon { color: #EAE8E1; }
        html.tema-escuro .close-icon:hover { color: #E7F118; }
        html.tema-escuro .input-group label,
        html.tema-escuro .signup-link { color: #D7D7E8; }
        html.tema-escuro .input-group input {
            color: #FFFFFF; border-bottom-color: #4B4B82; caret-color: #E7F118;
        }
        html.tema-escuro .input-group input:focus { border-bottom-color: #E7F118; }
        html.tema-escuro .input-group input:-webkit-autofill,
        html.tema-escuro .input-group input:-webkit-autofill:hover,
        html.tema-escuro .input-group input:-webkit-autofill:focus {
            -webkit-text-fill-color: #FFFFFF;
            -webkit-box-shadow: 0 0 0 1000px #15154A inset;
            transition: background-color 9999s ease-out 0s;
        }
        html.tema-escuro .btn-entrar {
            background: #E7F118; color: #0F0F77;
            box-shadow: 0 5px 18px rgba(231, 241, 24, .2);
        }
        html.tema-escuro .btn-entrar:hover { background: #F32C06; color: #FFFFFF; opacity: 1; }
        html.tema-escuro .signup-link span { color: #E7F118; }
        html.tema-escuro .alerta-erro {
            background: #3A171B; border-left-color: #F32C06; color: #FFD3CB;
        }
        html.tema-escuro .tema-toggle-auth {
            background: #20205B; border-color: #4B4B82; color: #E7F118;
            box-shadow: 0 8px 22px rgba(0, 0, 0, .34);
        }
        html.tema-escuro .tema-toggle-auth:hover { background: #E7F118; color: #0F0F77; }
        html.tema-escuro .logo-sebrae {
            filter: drop-shadow(0 0 1px rgba(231, 241, 24, .75));
        }

    </style>
</head>
<body>


<div class="login-wrapper">
    <div class="login-container">
        <button type="button" class="tema-toggle-auth" data-tema-toggle aria-label="Ativar modo escuro" title="Modo escuro">☾</button>
        <a th:href="@{/}" class="close-icon" style="text-decoration: none;">✕</a>

        <img th:src="@{/assets/logo-sebrae.png}" alt="Logo Ki" class="logo-sebrae" />

        <h2>Acessar o Sistema</h2>

        <div th:if="${erro}" class="alerta-erro">
            <p th:text="${erro}"></p>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" autocomplete="email" required />
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" autocomplete="current-password" required />
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <a th:href="@{/cadastro}" class="signup-link">
            Não tem uma conta? <span>Cadastre-se aqui</span>
        </a>
    </div>
</div>

<script th:src="@{/js/recursos-plataforma.js}"></script>
</body>
</html>
