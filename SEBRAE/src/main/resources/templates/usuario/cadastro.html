<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SEBRAE - Cadastro de Usuário</title>
    <link rel="stylesheet" th:href="@{/css/estilo-sebrae.css}" />
</head>
<body>
<h2>Criar Nova Conta</h2>

<div th:if="${erro}" style="color: red;">
    <p th:text="${erro}"></p>
</div>

<form th:action="@{/cadastro}" th:object="${usuario}" method="post">
    <div>
        <label>Nome:</label>
        <input type="text" th:field="*{nome}" required />
    </div>
    <div>
        <label>E-mail:</label>
        <input type="email" th:field="*{email}" required />
    </div>
    <div>
        <label>Senha:</label>
        <input type="password" th:field="*{senha}" required />
    </div>
    <button type="submit">Cadastrar</button>
</form>

<br/>
<a th:href="@{/login}">Já tem uma conta? Faça login aqui</a>
</body>
</html>
