<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBRAE - Registo de Utilizador</title>
    <style>
        /* --- Reset e Alinhamento Global --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        .auth-wrapper {
            background: linear-gradient(135deg, #0F0F77 0%, #0F0F77 58%, #F32C06 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; padding: 20px;
        }

        /* --- Card Branco Minimalista --- */
        .auth-container {
            background-color: #ffffff; padding: 40px 40px; width: 100%; max-width: 440px;
            text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); border-radius: 4px;
            max-height: 95vh;
            overflow-y: auto;
        }

        .close-icon { position: absolute; top: 25px; right: 25px; color: #a0aec0; font-size: 18px; cursor: pointer; text-decoration: none; }

        .logo-sebrae { display: block; max-width: 120px; height: auto; margin: 0 auto 15px auto; }

        .auth-container h2 { color: #0F0F77; font-size: 24px; margin-bottom: 30px; font-weight: 600; letter-spacing: 0.5px; }

        /* --- Estilização dos Blocos de Erro --- */
        .alerta-erro {
            background-color: #FFF5F5; border-left: 4px solid #E53E3E;
            color: #C53030; padding: 12px; margin-bottom: 25px; font-size: 14px; text-align: left; border-radius: 4px; border-top: 7px solid #E7F118;
        }

        .erro-campo {
            color: #C53030;
            font-size: 12px;
            margin-top: 6px;
        }

        /* --- Inputs em Linha --- */
        .input-group { text-align: left; margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 13px; color: #718096; margin-bottom: 4px; }
        .input-group label::before { content: "• "; color: #F32C06; font-weight: bold; }

        .input-group input {
            width: 100%; padding: 10px 0px; border: none; border-bottom: 2px solid #e2e8f0;
            font-size: 16px; color: #2d3748; outline: none; background: transparent; transition: border-color 0.3s ease;
        }
        .input-group input:focus { border-bottom-color: #F32C06; }
        .input-group input:invalid:not(:placeholder-shown) { border-bottom-color: #E53E3E; }

        /* --- Botões e Links --- */
        .btn-primario {
            width: 100%; padding: 16px; background: linear-gradient(90deg, #0F0F77 0%, #F32C06 100%);
            color: #ffffff; border: none; font-size: 15px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer; margin-top: 10px; margin-bottom: 25px;
            transition: opacity 0.2s ease, transform 0.1s ease; box-shadow: 0 4px 12px rgba(243, 44, 6, 0.28);
            border-radius: 4px;
        }
        .btn-primario:hover { opacity: 0.95; }
        .btn-primario:active { transform: scale(0.99); }

        .link-rodape { display: inline-block; font-size: 14px; color: #718096; text-decoration: none; }
        .link-rodape span { color: #0F0F77; font-weight: 600; }
        .link-rodape:hover span { text-decoration: underline; }

    </style>
</head>
<body>


<div class="auth-wrapper">
    <div class="auth-container">
        <a th:href="@{/}" class="close-icon">✕</a>

        <img th:src="@{/assets/logo-sebrae.png}" alt="Sebrae Logo" class="logo-sebrae" />

        <h2>Criar Nova Conta</h2>

        <div th:if="${erro}" class="alerta-erro">
            <p th:text="${erro}"></p>
        </div>

        <form th:action="@{/cadastro}" th:object="${usuario}" method="post" id="formCadastro">

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" th:field="*{nome}" maxlength="120" autocomplete="name" required placeholder="Insira o seu nome" />
                <p class="erro-campo" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" th:field="*{email}" maxlength="160" autocomplete="email" required placeholder="exemplo@email.com" />
                <p class="erro-campo" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" th:field="*{senha}" minlength="6" maxlength="100" autocomplete="new-password" required placeholder="Crie uma senha forte" />
                <p class="erro-campo" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></p>
            </div>

            <div class="input-group">
                <label for="confirmarSenha">Confirmar Senha</label>
                <input type="password" id="confirmarSenha" name="confirmarSenha" minlength="6" maxlength="100" autocomplete="new-password" required placeholder="Digite a senha novamente" />
                <p class="erro-campo" th:if="${erroConfirmarSenha}" th:text="${erroConfirmarSenha}"></p>
            </div>

            <button type="submit" class="btn-primario">Cadastrar</button>
        </form>

        <a th:href="@{/login}" class="link-rodape">
            Já tem uma conta? <span>Faça login aqui</span>
        </a>
    </div>
</div>

<script>
    (function () {
        const formulario = document.getElementById('formCadastro');
        const senha = document.getElementById('senha');
        const confirmarSenha = document.getElementById('confirmarSenha');

        function validarSenhas() {
            if (confirmarSenha.value && senha.value !== confirmarSenha.value) {
                confirmarSenha.setCustomValidity('As senhas não coincidem.');
            } else {
                confirmarSenha.setCustomValidity('');
            }
        }

        senha.addEventListener('input', validarSenhas);
        confirmarSenha.addEventListener('input', validarSenhas);
        formulario.addEventListener('submit', validarSenhas);
    }());
</script>

</body>
</html>
