# Ative com SPRING_PROFILES_ACTIVE=prod.
# Em produção, as três variáveis abaixo são obrigatórias.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

spring.thymeleaf.cache=true
spring.jpa.show-sql=false

# /tmp é gravável em praticamente todas as plataformas. O conteúdo é temporário.
aplicacao.upload.cursos=${UPLOAD_DIR:/tmp/ki/uploads/cursos}

server.error.include-message=never
server.error.include-binding-errors=never
