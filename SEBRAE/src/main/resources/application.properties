spring.application.name=Ki

# Banco local por padrão. Em hospedagem, defina SPRING_DATASOURCE_URL,
# SPRING_DATASOURCE_USERNAME e SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sebrae_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Limita o pool para caber em instâncias gratuitas com pouca memória.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.connection-timeout=30000

spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Pode ser substituído por UPLOAD_DIR. Em planos gratuitos o disco costuma ser temporário.
aplicacao.upload.cursos=${UPLOAD_DIR:uploads/cursos}

# A plataforma informa PORT durante o deploy; localmente permanece em 8080.
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Conta administrativa criada/sincronizada automaticamente na inicialização.
aplicacao.admin.nome=${ADMIN_NAME:Administrador}
aplicacao.admin.email=${ADMIN_EMAIL:admin@gmail.com}
aplicacao.admin.password=${ADMIN_PASSWORD:admin123}
