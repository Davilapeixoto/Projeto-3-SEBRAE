spring.application.name=SEBRAE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
aplicacao.upload.cursos=uploads/cursos
server.port=8080

# Conta administrativa criada automaticamente durante a inicializacao.
# Os valores podem ser substituidos pelas variaveis ADMIN_NAME, ADMIN_EMAIL
# e ADMIN_PASSWORD sem alterar este arquivo.
aplicacao.admin.nome=${ADMIN_NAME:Administrador}
aplicacao.admin.email=${ADMIN_EMAIL:admin@gmail.com}
aplicacao.admin.password=${ADMIN_PASSWORD:admin123}
